version: 1.0
runtime: nodejs22
build:
  commands:
    pre-build:
      - npm ci
    build:
      - npm run build -w @agentcompany/web
run:
  runtime-version: 22.21.1
  command: npm run start -w @agentcompany/web -- --hostname 0.0.0.0 --port 3000
  network:
    port: 3000
  env:
    - name: APP_ENV
      value: production
    - name: NEXT_PUBLIC_APP_NAME
      value: AgentCompany
    - name: RATE_LIMIT_MAX_REQUESTS
      value: "300"
    - name: RATE_LIMIT_WINDOW_MS
      value: "60000"
    - name: DATABASE_POOL_MAX
      value: "10"
    - name: ENABLE_SERVER_COMMANDS
      value: "false"
